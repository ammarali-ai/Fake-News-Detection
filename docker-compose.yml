# Multilingual Fake News Detector — docker-compose.yml
version: "3.9"

services:
  gradio-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fake-news-gradio
    command: ["python", "app.py"]
    ports:
      - "7860:7860"
    environment:
      # Defaults to the private project model repo. Override via .env or shell.
      HF_MODEL_REPO_ID: "${HF_MODEL_REPO_ID:-ammarali-ai/Fake-News-Detection}"
      # REQUIRED — the model repo is private/gated.
      HF_TOKEN: "${HF_TOKEN:-}"
    volumes:
      - ./saved_model:/app/saved_model
    restart: unless-stopped

  fastapi-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fake-news-api
    command: ["python", "-m", "uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      HF_MODEL_REPO_ID: "${HF_MODEL_REPO_ID:-ammarali-ai/Fake-News-Detection}"
      HF_TOKEN: "${HF_TOKEN:-}"
    volumes:
      - ./saved_model:/app/saved_model
    restart: unless-stopped
