# Multilingual Fake News Detector — docker-compose.yml
version: "3.9"

services:
  gradio-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fake-news-gradio
    command: ["python", "app.py"]
    ports:
      - "7860:7860"
    environment:
      # Optional: set to "<owner>/<repo>" to fetch the SavedModel from the
      # HuggingFace Hub at startup when ./saved_model/ is empty.
      HF_MODEL_REPO_ID: "${HF_MODEL_REPO_ID:-}"
    volumes:
      - ./saved_model:/app/saved_model
    restart: unless-stopped

  fastapi-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fake-news-api
    command: ["python", "-m", "uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      HF_MODEL_REPO_ID: "${HF_MODEL_REPO_ID:-}"
    volumes:
      - ./saved_model:/app/saved_model
    restart: unless-stopped
