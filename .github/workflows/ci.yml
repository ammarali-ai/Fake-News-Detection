# Multilingual Fake News Detector — .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Syntax checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile all Python modules
        run: |
          python -m py_compile model_loader.py app.py api.py evaluate.py
          python -m py_compile tests/test_model_loader.py

      - name: Bash syntax check (deploy.sh)
        run: bash -n deploy.sh

      - name: PowerShell syntax check (deploy.ps1)
        shell: pwsh
        run: |
          $errors = $null
          $null = [System.Management.Automation.PSParser]::Tokenize(
            (Get-Content deploy.ps1 -Raw), [ref]$errors)
          if ($errors -and $errors.Count -gt 0) {
            $errors | Format-List
            exit 1
          }

  tests:
    name: Unit tests (no model required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lightweight test deps
        # Skip the heavy ML stack — tests/test_model_loader.py uses
        # pytest.importorskip so it gracefully skips when TF is missing.
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run pytest
        run: pytest -q tests/
